<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gait Detection App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    let gyro = [[], [], []], accel = [[], [], []], heading = [[], [], []];
    let startTime = null, deltaTime = 0, userAge = 0, collecting = false;
    let general_prediction = null, specific_prediction = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function handleMotion(event) {
        if (!collecting) return;
        const a = event.acceleration || event.accelerationIncludingGravity;
        if (a) {
            accel[0].push(a.x || 0); accel[1].push(a.y || 0); accel[2].push(a.z || 0);
        }
        if (event.rotationRate) {
            gyro[0].push(event.rotationRate.alpha || 0);
            gyro[1].push(event.rotationRate.beta || 0);
            gyro[2].push(event.rotationRate.gamma || 0);
        }
        const counter = document.getElementById('data-counter');
        if (counter) counter.textContent = `Samples: ${accel[0].length}`;
    }

    function handleOrientation(event) {
        if (!collecting) return;
        heading[0].push(event.alpha || 0);
        heading[1].push(event.beta || 0);
        heading[2].push(event.gamma || 0);
    }

    async function validateAndStart() {
        const age = parseInt(document.getElementById("ageInput").value);
        if (!age || age < 1 || age > 120) {
            document.getElementById("ageError").classList.remove("hidden");
            return;
        }

        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
                const permission = await DeviceMotionEvent.requestPermission();
                if (permission !== 'granted') return alert("Permission denied.");
            } catch (error) {
                alert("Please use HTTPS and ensure sensors are enabled in your browser settings.");
                return;
            }
        }

        window.addEventListener("devicemotion", handleMotion, true);
        window.addEventListener("deviceorientation", handleOrientation, true);
        
        userAge = age;
        startCountdown('testing');
    }

    function startCountdown(targetScreen) {
        let countdown = 3;
        const btn = document.getElementById("countdownButton");
        const interval = setInterval(function() {
            if (countdown > 0) {
                btn.textContent = `Starting in ${countdown}...`;
                countdown--;
            } else {
                clearInterval(interval);
                btn.textContent = `Start Now`;
                showScreen(targetScreen);
                
                accel = [[], [], []]; gyro = [[], [], []]; heading = [[], [], []];
                startTime = performance.now();
                collecting = true;
            }
        }, 1000);
    }

    function stopSensors() {
        collecting = false;
        deltaTime = (performance.now() - startTime) / 1000;
        window.removeEventListener("devicemotion", handleMotion);
        window.removeEventListener("deviceorientation", handleOrientation);
    }

    async function fetchData(endpoint) {
      const response = await fetch(`https://sb34221-gaitapi.hf.space/${endpoint}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          gyr: gyro, acc: accel, mag: heading,
          user: { duration: deltaTime, age: userAge }
        })
      });
      return await response.json();
    }

    async function processResults() {
      stopSensors();
      if (accel[0].length < 10) {
          alert("No data detected. Check permissions!");
          location.reload();
          return;
      }
      showScreen('loading');

      try {
        const [gen, spec] = await Promise.all([
          fetchData('predict_risk'), 
          fetchData('predict_subtype')
        ]);
        general_prediction = gen;
        specific_prediction = spec;
        renderDashboard();
        showScreen('dashboard');
      } catch (error) {
        alert("API Error: " + error.message);
        showScreen('main');
      }
    }

    function renderDashboard() {
      const resultsContainer = document.getElementById('conditions-list');
      const mostLikely = document.getElementById('most-likely');
      const descContainer = document.getElementById('description');
      
      resultsContainer.innerHTML = '';
      
      const genRow = document.createElement('div');
      genRow.className = 'flex justify-between p-2 border-b font-bold text-gray-800';
      genRow.innerHTML = `<span>General Risk</span><span>${general_prediction.risk} (${general_prediction.chance}%)</span>`;
      resultsContainer.appendChild(genRow);

      if (general_prediction.risk_level === "LOW") {
        mostLikely.textContent = "Normal Gait";
        descContainer.innerHTML = "LOW risk detected. Gait appears normal.";
      } else {
        mostLikely.textContent = specific_prediction.subtype || "Unknown";
        let scoresHTML = '<div class="mt-2 text-sm space-y-1">';
        
        const scores = specific_prediction.probability_scores || {};
        for (const [name, prob] of Object.entries(scores)) {
          scoresHTML += `<div class="flex justify-between"><span>${name}:</span><span>${(prob * 100).toFixed(1)}%</span></div>`;
        }
        scoresHTML += '</div>';
        resultsContainer.innerHTML += scoresHTML;
        descContainer.innerHTML = general_prediction.risk_level === "HIGH" ? "HIGH risk detected. It's recommended to visit a professional for proper screening." : "MODERATE risk detected. Consider visiting a professional for proper screening.";
      }
    }

    window.onload = () => showScreen('main');
  </script>
</head>
<body class="bg-gray-300">
  <div id="main" class="screen hidden">
    <div class="flex h-screen items-center justify-center">
      <div class="mx-4 rounded-2xl bg-white p-6 shadow-md max-w-lg">
        <div class="flex flex-col items-center gap-3">
          <div class="text-3xl font-bold text-orange-400">Gait Detection App</div>
          <p class="text-center text-gray-700">Scan walking patterns for neurological insights.</p>
          <input id="ageInput" type="number" placeholder="Enter your age" class="mt-4 w-full rounded-lg border border-gray-300 p-3 text-center" />
          <div id="ageError" class="hidden text-sm text-red-500">Please enter a valid age.</div>
          <button id="countdownButton" class="mt-5 w-full rounded-xl bg-green-500 px-6 py-3 text-white font-bold" onclick="validateAndStart()">Start Now</button>
        </div>
      </div>
    </div>
  </div>

  <div id="testing" class="screen hidden">
    <div class="flex h-screen items-center justify-center">
      <div class="mx-4 rounded-2xl bg-white p-6 shadow-md text-center">
        <div class="text-3xl font-bold text-orange-400 animate-pulse">Recording...</div>
        <div id="data-counter" class="text-xl font-mono text-gray-400 mt-2">Samples: 0</div>
        <p class="mt-4 text-gray-700">Walk 10 meters in a straight line now.</p>
        <button class="mt-8 rounded-xl bg-red-500 px-10 py-4 text-xl font-bold text-white" onclick="processResults()">End Test</button>
      </div>
    </div>
  </div>

  <div id="loading" class="screen hidden">
    <div class="flex h-screen items-center justify-center text-center">
      <div class="mx-4 bg-white p-10 rounded-2xl shadow-md">
        <div class="inline-block h-12 w-12 animate-spin rounded-full border-4 border-orange-400 border-t-transparent mb-4"></div>
        <div class="text-2xl font-bold">Analyzing Data</div>
      </div>
    </div>
  </div>

  <div id="dashboard" class="screen hidden">
    <div class="flex h-screen items-center justify-center">
      <div class="mx-4 bg-white p-6 rounded-2xl shadow-md max-w-md w-full text-center">
          <div class="text-3xl font-bold text-orange-400">Results</div>
          <div id="conditions-list" class="w-full mt-6 bg-gray-50 rounded-lg p-4"></div>
          <div class="mt-6 font-bold">Likely Condition: <span id="most-likely" class="text-orange-500"></span></div>
          <div id="description" class="mt-3 bg-orange-50 p-4 text-sm rounded-lg border border-orange-100"></div>
          <button class="mt-8 w-full bg-blue-500 py-3 text-white font-bold rounded-xl" onclick="location.reload()">New Test</button>
      </div>
    </div>
  </div>
</body>
</html>
